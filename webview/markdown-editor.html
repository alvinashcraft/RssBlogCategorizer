<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" 
          content="default-src 'none'; 
                   script-src {{cspSource}} https://cdn.jsdelivr.net; 
                   style-src {{cspSource}} https://cdn.jsdelivr.net https://cdnjs.cloudflare.com;
                   img-src {{cspSource}} https: data:;
                   font-src {{cspSource}} https://cdn.jsdelivr.net https://cdnjs.cloudflare.com;
                   connect-src https://cdn.jsdelivr.net;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dew Drop Markdown Editor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde@2.18.0/dist/easymde.min.css">
    <link rel="stylesheet" href="{{editorCssPath}}">
</head>
<body data-theme="{{theme}}">
    <div id="i18n-data"
         data-editor-loading-error="{{i18nEditorLoadingError}}"
         data-retry="{{i18nRetry}}"
         data-failed-to-load="{{i18nFailedToLoadMarkdownEditor}}"
         data-failed-to-init="{{i18nFailedToInitMarkdownEditor}}"
         data-last-saved-format="{{i18nLastSavedFormat}}"
         style="display:none;"></div>
    <div id="loading" class="loading">{{i18nLoading}}</div>
    
    <div id="editor-container">
        <textarea id="markdown-textarea">{{initialContent}}</textarea>
    </div>
    
    <div class="button-bar">
        <div class="last-saved" id="last-saved"></div>
        <div class="button-group">
            <button id="cancel-btn" title="{{i18nCancelTooltip}}">{{i18nCancel}}</button>
            <button id="save-btn" title="{{i18nSaveTooltip}}">{{i18nSave}}</button>
            <button id="save-close-btn" title="{{i18nSaveCloseTooltip}}">{{i18nSaveClose}}</button>
            <button id="save-publish-btn" title="{{i18nSavePublishTooltip}}">{{i18nSavePublish}}</button>
        </div>
    </div>
    
    <!-- Load EasyMDE from CDN, then our editor script which handles initialization and errors -->
    <script src="https://cdn.jsdelivr.net/npm/easymde@2.18.0/dist/easymde.min.js"></script>
    <script src="{{editorJsPath}}"></script>
</body>
</html>
